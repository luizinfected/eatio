services:
  nats:
    image: nats:latest
    container_name: eatio-nats
    ports:
      - "4222:4222"

  bff:
    container_name: eatio-bff
    build:
      context: .
      dockerfile: ./apps/bff/Dockerfile
    volumes:
      - .:/app
    ports:
      - "3000:3000"
      - "3001:3001"
    env_file:
      - ./apps/bff/.env
    depends_on:
      - nats

  user:
    container_name: eatio-user
    build:
      context: .
      dockerfile: ./apps/user/Dockerfile
    volumes:
      - .:/app
    env_file:
      - ./apps/user/.env
    depends_on:
      - nats
  restaurant:
    container_name: eatio-restaurant
    build:
      context: .
      dockerfile: ./apps/restaurant/Dockerfile
    volumes:
      - .:/app
    env_file:
      - ./apps/restaurant/.env
    depends_on:
      - nats
  order:
    container_name: eatio-order
    build:
      context: .
      dockerfile: ./apps/order/Dockerfile
    volumes:
      - .:/app
    env_file:
      - ./apps/order/.env
    depends_on:
      - nats